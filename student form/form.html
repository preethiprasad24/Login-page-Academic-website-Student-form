<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    <h1>Student Registration Form</h1>

    <form class="student-form">

        <label >Student ID</label>
        <input  type="text" placeholder="Enter Student ID" required>

        <label >Full Name</label>
        <input  type="text" placeholder="Enter Full Name" required>

        <label >Date of Birth</label>
        <input style="color: #f9f6f6" type="date" required>

        <label>Gender</label>
        <select style="color: #fcf9f9;background-color: rgb(49, 146, 185)"required>
            <option style="color: #faf7f7" value=" ">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <label >Email</label>
        <input required placeholder="@gmail.com">

        <label >Phone Number</label>
        <input type="tel" placeholder="Enter Phone Number" required>

        <label >Address</label>
        <textarea style="background-color:rgb(49, 146, 185)"rows="4" placeholder="Enter Address"></textarea>

        <label >Course</label>
        <select style="color: #fffefe;background-color: rgb(49, 146, 185)"required>
            <option value="">Select Course</option>
            <option>HTML & CSS</option>
            <option>JavaScript</option>
            <option>Python</option>
            <option>Java</option>
        </select>

        <label>Admission Date</label>
        <input style="color:#f5f4f4" type="date" required>

        <button onclick="submitted()" type="submit">Submit</button>
        <button type="reset">Clear</button>

    </form>

    <br>
    <a href="../website/website.html" style="color: rgb(13, 24, 78); font-size: 20px;">⬅ Back to Home</a>
<script src="form.js"></script>
</body>
</html>
